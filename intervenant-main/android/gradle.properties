# PC ~7 Go RAM : G1 GC échoue souvent ("overflow mark stack"). Utiliser Serial GC + tas modeste.
# Fermer navigateurs / apps lourds avant : flutter run + Gradle + Android Studio consomment beaucoup.
org.gradle.jvmargs=-Xmx1024m -Xms128m -XX:MaxMetaspaceSize=384m -XX:ReservedCodeCacheSize=64m -XX:+UseSerialGC -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx512m -XX:MaxMetaspaceSize=256m -XX:+UseSerialGC
org.gradle.parallel=false
org.gradle.workers.max=1
org.gradle.daemon=true
android.useAndroidX=true
