# Moins de RAM pour Gradle laisse de la marge au compilateur Dart (kernel_snapshot) :
# avec -Xmx8G + Dart, l’ensemble dépasse souvent la RAM machine → Out of memory.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
# Réduit les plantages de cache Gradle sur Windows (verrous / tâches L8).
org.gradle.parallel=false
org.gradle.caching=false
org.gradle.configureondemand=false
org.gradle.workers.max=1
